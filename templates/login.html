<!DOCTYPE html> 
{% load static %}  
<html lang="en"> 
<head>     
    <meta charset="UTF-8">     
    <meta name="viewport" content="width=device-width, initial-scale=1.0">     
    <title>Login Page</title>     
    <link rel="stylesheet" type="text/css" href="{% static 'css/stylelog.css' %}">
</head> 
<body>     
    <div class="container">         
        <div class="login-section">             
            <div class="logo">                 
                <img src="{% static 'image/gdgg.png' %}" alt="Logo">             
            </div>             
            <h2>Login to Your Account</h2>
            
            <form class="login-form" method="post" action="{% url 'doctor_login' %}">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="id_username">Email:</label>
                    {{ form.username.errors }}
                    {{ form.username }}  <!-- This connects to your form -->
                </div>
                
                <div class="form-group">
                    <label for="id_password">Password:</label>
                    {{ form.password.errors }}
                    {{ form.password }}  <!-- This connects to your form -->
                </div>
                
                <button type="submit" class="sign-in-btn">Sign In</button>
            </form>        
        </div>         
        <div class="signup-section">             
            <h2>New Here?</h2>             
            <a href="{% url 'signup' %}"><button class="sign-up-btn">Sign Up</button></a>         
        </div>     
    </div> 
</body> 
</html>
